    <!-- Interactive Scripts for Search, Category and Modal Streaming -->
    <script>
        let player = null;

        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('live-video-player');
        });

        // Open Modal and Play
        function playChannel(channelName, streamUrl) {
            document.getElementById('modalChannelTitle').innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span> Streaming: ${channelName}`;
            document.getElementById('playerModal').classList.remove('hidden');
            document.getElementById('playerModal').classList.add('flex');

            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });
            player.play();
        }

        // Close Modal and Stop Playing
        function closePlayer() {
            document.getElementById('playerModal').classList.remove('flex');
            document.getElementById('playerModal').classList.add('hidden');
            player.pause();
        }

        // Filter Channels by Category
        function filterCategory(category) {
            const channels = document.querySelectorAll('#channelsContainer > div');
            channels.forEach(channel => {
                if (category === 'all' || channel.getAttribute('data-category') === category) {
                    channel.classList.remove('hidden');
                } else {
                    channel.classList.add('hidden');
                }
            });

            // Highlight active button style
            const buttons = document.querySelectorAll('.scrollbar-hide button');
            buttons.forEach(btn => {
                btn.className = "px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-sm text-white/80 whitespace-nowrap";
            });
            event.currentTarget.className = "px-4 py-2 bg-lime-500 text-black font-bold rounded-xl text-sm whitespace-nowrap";
        }

        // Search Filter System
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchValue = e.target.value.toLowerCase();
            const channels = document.querySelectorAll('#channelsContainer > div');
            
            channels.forEach(channel => {
                const title = channel.querySelector('h3').textContent.toLowerCase();
                if (title.includes(searchValue)) {
                    channel.classList.remove('hidden');
                } else {
                    channel.classList.add('hidden');
                }
            });
        });
    </script>
